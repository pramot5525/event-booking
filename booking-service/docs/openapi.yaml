openapi: 3.0.3
info:
  title: Booking Service
  version: 1.0.0
  description: |
    High-concurrency booking API using Redis-first quota checks (SET NX + DECR)
    and Postgres persistence with rollback on failure.

servers:
  - url: http://localhost:8082

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/bookings:
    post:
      summary: Book a seat
      description: |
        Booking flow:
        1) Acquire idempotency lock with Redis SET NX
        2) Atomically decrement quota with Redis DECR
        3) Persist booking in Postgres
        4) If quota is full, rollback with Redis INCR and persist waitlist entry
        5) Rollback quota with Redis INCR if DB write fails
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking confirmed or waitlisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookSeatResult"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Booking conflict (in progress or already booked)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                quotaNotInitialized:
                  value:
                    error: quota is not initialized for this event
                inProgress:
                  value:
                    error: booking is already in progress for this user
                alreadyBooked:
                  value:
                    error: user already booked this event
        "500":
          description: Internal error while booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/quota/init:
    post:
      summary: Initialize or reset event quota in Redis
      operationId: initializeQuota
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitializeQuotaRequest"
      responses:
        "200":
          description: Quota initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitializeQuotaResponse"
        "400":
          description: Invalid event_id or quota
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to initialize quota
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    CreateBookingRequest:
      type: object
      required:
        - event_id
        - user_name
        - user_email
      properties:
        event_id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        user_name:
          type: string
          minLength: 1
          example: Somchai Jaidee
        user_email:
          type: string
          format: email
          example: somchai@example.com
        user_phone:
          type: string
          example: "0812345678"

    Booking:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        event_id:
          type: integer
          format: int64
          example: 1
        uid:
          type: string
          example: 73194280-7f53-5d68-96af-d8a3ee878374
        user_name:
          type: string
          example: Somchai Jaidee
        user_email:
          type: string
          format: email
          example: somchai@example.com
        user_phone:
          type: string
          example: "0812345678"
        status:
          type: string
          example: confirmed
        created_at:
          type: string
          format: date-time
          example: "2026-04-02T13:00:00Z"

    BookSeatResult:
      type: object
      required:
        - status
        - remaining_seats
      properties:
        status:
          type: string
          enum:
            - confirmed
            - waitlisted
          example: waitlisted
        remaining_seats:
          type: integer
          format: int64
          example: 0
        booking:
          $ref: "#/components/schemas/Booking"
        waitlist_entry:
          $ref: "#/components/schemas/Booking"

    InitializeQuotaRequest:
      type: object
      required:
        - event_id
        - quota
      properties:
        event_id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        quota:
          type: integer
          format: int64
          minimum: 0
          example: 100

    InitializeQuotaResponse:
      type: object
      properties:
        message:
          type: string
          example: quota initialized
        event_id:
          type: integer
          format: int64
          example: 1
        quota:
          type: integer
          format: int64
          example: 100

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: booking failed
