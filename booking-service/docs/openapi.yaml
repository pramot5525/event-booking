openapi: 3.0.3
info:
  title: Booking Service
  version: 1.0.0
  description: |
    High-concurrency booking API using Redis-first quota checks (SET NX + DECR)
    and Postgres persistence with rollback on failure.

servers:
  - url: http://localhost:8082

paths:
  /api/v1/bookings:
    post:
      summary: Book a seat
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking confirmed or waitlisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookSeatResult"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: User already has a booking (confirmed or waitlisted) for this event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                alreadyBooked:
                  value:
                    error: user already booked this event
        "500":
          description: Internal error while booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    CreateBookingRequest:
      type: object
      required:
        - event_id
        - user_name
        - user_email
      properties:
        event_id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        user_name:
          type: string
          minLength: 1
          example: Somchai Jaidee
        user_email:
          type: string
          format: email
          example: somchai@example.com
        user_phone:
          type: string
          example: "0812345678"

    Booking:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        event_id:
          type: integer
          format: int64
          example: 1
        uid:
          type: string
          example: 73194280-7f53-5d68-96af-d8a3ee878374
        user_name:
          type: string
          example: Somchai Jaidee
        user_email:
          type: string
          format: email
          example: somchai@example.com
        user_phone:
          type: string
          example: "0812345678"
        status:
          type: string
          enum:
            - confirmed
            - waitlisted
          example: confirmed
        position:
          type: integer
          format: int64
          description: Waitlist position; present only when status is "waitlisted"
          example: 3
        created_at:
          type: string
          format: date-time
          example: "2026-04-02T13:00:00Z"

    BookSeatResult:
      type: object
      required:
        - status
        - remaining_seats
      properties:
        status:
          type: string
          enum:
            - confirmed
            - waitlisted
          example: waitlisted
        remaining_seats:
          type: integer
          format: int64
          example: 0
        booking:
          $ref: "#/components/schemas/Booking"
        waitlist_entry:
          $ref: "#/components/schemas/Booking"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: booking failed
